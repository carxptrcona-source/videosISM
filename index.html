<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Content Machine Lite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div>
        <div class="header-title" id="headerTitle">🚀 YT CONTENT MACHINE LITE</div>
        <div class="header-sub" id="headerSub">Sistema liviano para creación de contenido</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" id="btnSaveNow">Guardar</button>
        <button class="btn btn-primary" id="btnExport">Exportar</button>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar" id="sidebar">
        <div class="brand-box">
          <div class="brand-logo">⚡</div>
          <div>
            <div class="brand-name">Content OS</div>
            <div class="brand-mini">ERB + ISM + IA</div>
          </div>
        </div>

        <nav class="nav" id="nav"></nav>

        <div class="side-card">
          <div class="side-card-title">⚙️ Config rápida</div>
          <label class="label">Modo IA</label>
          <select id="aiModeSelect" class="input">
            <option value="manual">Manual (copiar prompt)</option>
            <option value="api">API/Proxy</option>
          </select>

          <label class="label">URL Proxy IA</label>
          <input id="aiProxyUrl" class="input" placeholder="https://tu-proxy.com/generate" />

          <label class="label">Modelo</label>
          <input id="aiModel" class="input" placeholder="gemini-1.5-flash" />

          <button class="btn btn-success full" id="btnSaveConfig">Guardar config</button>
        </div>

        <div class="side-card">
          <div class="side-card-title">💾 Backups</div>
          <button class="btn btn-ghost full" id="btnImport">Importar JSON</button>
          <input type="file" id="importFile" accept="application/json" hidden />
          <button class="btn btn-danger full" id="btnResetApp">Reset total</button>
        </div>
      </aside>

      <section class="content" id="content"></section>
    </main>
  </div>

  <div class="modal hidden" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">Modal</div>
        <button class="icon-btn" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
